<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="sans-serif">
  <rect width="900" height="360" fill="#1a1a2e"/>

  <!-- ─── ORIGINAL ─── -->
  <text x="24" y="62" fill="#aaa" font-size="14" font-weight="bold">Original</text>
  <line x1="130" y1="68" x2="820" y2="68" stroke="#4a9a6a" stroke-width="2.5"/>
  <line x1="130" y1="60" x2="130" y2="76" stroke="#4a9a6a" stroke-width="2"/>
  <line x1="475" y1="60" x2="475" y2="76" stroke="#777" stroke-width="1.5"/>
  <line x1="820" y1="60" x2="820" y2="76" stroke="#4a9a6a" stroke-width="2"/>
  <text x="130" y="90" text-anchor="middle" fill="#777" font-size="12">−4</text>
  <text x="475" y="90" text-anchor="middle" fill="#777" font-size="12">0</text>
  <text x="820" y="90" text-anchor="middle" fill="#777" font-size="12">4</text>

  <circle cx="215" cy="68" r="14" fill="#e07b39"/>
  <circle cx="258" cy="68" r="14" fill="#6abf69"/>
  <circle cx="330" cy="68" r="14" fill="#c8d44e"/>
  <circle cx="540" cy="68" r="14" fill="#e680a0"/>
  <circle cx="590" cy="68" r="14" fill="#6ec6e8"/>
  <circle cx="640" cy="68" r="14" fill="#aaaaaa"/>
  <circle cx="685" cy="68" r="14" fill="#e680a0" opacity="0.6"/>

  <!-- mean on original (faint) -->
  <line x1="480" y1="48" x2="480" y2="88" stroke="#e05555" stroke-width="2" opacity="0.35" stroke-dasharray="5,3"/>

  <!-- ─── BOOTSTRAP SAMPLE 1 ─── -->
  <text x="24" y="152" fill="#aaa" font-size="14" font-weight="bold">Bootstrap</text>
  <text x="24" y="170" fill="#aaa" font-size="12">sample 1</text>
  <line x1="130" y1="158" x2="820" y2="158" stroke="#4a9a6a" stroke-width="2.5"/>
  <line x1="130" y1="150" x2="130" y2="166" stroke="#4a9a6a" stroke-width="2"/>
  <line x1="475" y1="150" x2="475" y2="166" stroke="#777" stroke-width="1.5"/>
  <line x1="820" y1="150" x2="820" y2="166" stroke="#4a9a6a" stroke-width="2"/>
  <text x="130" y="180" text-anchor="middle" fill="#777" font-size="12">−4</text>
  <text x="475" y="180" text-anchor="middle" fill="#777" font-size="12">0</text>
  <text x="820" y="180" text-anchor="middle" fill="#777" font-size="12">4</text>

  <!-- resampled dots: orange gone, green doubled -->
  <circle cx="215" cy="158" r="14" fill="#6abf69"/>
  <circle cx="258" cy="158" r="14" fill="#6abf69"/>
  <circle cx="330" cy="158" r="14" fill="#c8d44e"/>
  <circle cx="540" cy="158" r="14" fill="#e680a0"/>
  <circle cx="590" cy="158" r="14" fill="#6ec6e8"/>
  <circle cx="685" cy="158" r="14" fill="#e680a0" opacity="0.6"/>
  <!-- mean marker -->
  <line x1="436" y1="138" x2="436" y2="178" stroke="#e05555" stroke-width="3"/>
  <text x="436" y="130" text-anchor="middle" fill="#e05555" font-size="11">x̄*</text>

  <!-- ─── BOOTSTRAP SAMPLE 2 ─── -->
  <text x="24" y="240" fill="#aaa" font-size="12">sample 2</text>
  <line x1="130" y1="248" x2="820" y2="248" stroke="#4a9a6a" stroke-width="2.5"/>
  <line x1="130" y1="240" x2="130" y2="256" stroke="#4a9a6a" stroke-width="2"/>
  <line x1="475" y1="240" x2="475" y2="256" stroke="#777" stroke-width="1.5"/>
  <line x1="820" y1="240" x2="820" y2="256" stroke="#4a9a6a" stroke-width="2"/>
  <text x="130" y="270" text-anchor="middle" fill="#777" font-size="12">−4</text>
  <text x="475" y="270" text-anchor="middle" fill="#777" font-size="12">0</text>
  <text x="820" y="270" text-anchor="middle" fill="#777" font-size="12">4</text>

  <circle cx="258" cy="248" r="14" fill="#6abf69"/>
  <circle cx="330" cy="248" r="14" fill="#c8d44e"/>
  <circle cx="475" cy="248" r="14" fill="#6abf69" opacity="0.7"/>
  <circle cx="590" cy="248" r="14" fill="#6ec6e8"/>
  <circle cx="640" cy="248" r="14" fill="#aaaaaa"/>
  <circle cx="685" cy="248" r="14" fill="#e680a0" opacity="0.6"/>
  <line x1="498" y1="228" x2="498" y2="268" stroke="#e05555" stroke-width="3"/>
  <text x="498" y="220" text-anchor="middle" fill="#e05555" font-size="11">x̄*</text>

  <!-- ─── "repeat ..." ─── -->
  <text x="450" y="310" text-anchor="middle" fill="#888" font-size="20" letter-spacing="10">· · ·</text>

  <!-- ─── label: we calculate the mean ─── -->
  <text x="830" y="155" fill="#e05555" font-size="13">← we calculate</text>
  <text x="830" y="173" fill="#e05555" font-size="13">    the mean</text>
</svg>
