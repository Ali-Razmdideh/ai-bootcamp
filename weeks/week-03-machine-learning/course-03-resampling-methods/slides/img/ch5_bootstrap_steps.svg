<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="sans-serif">
  <rect width="900" height="340" fill="#1a1a2e"/>

  <!-- ─── ORIGINAL ─── -->
  <text x="24" y="52" fill="#ccc" font-size="13" font-weight="bold">Original</text>
  <line x1="130" y1="58" x2="660" y2="58" stroke="#4a9a6a" stroke-width="2.5"/>
  <line x1="130" y1="50" x2="130" y2="66" stroke="#4a9a6a" stroke-width="2"/>
  <line x1="395" y1="50" x2="395" y2="66" stroke="#777" stroke-width="1.5"/>
  <line x1="660" y1="50" x2="660" y2="66" stroke="#4a9a6a" stroke-width="2"/>
  <text x="130" y="80" text-anchor="middle" fill="#777" font-size="11">−4</text>
  <text x="395" y="80" text-anchor="middle" fill="#777" font-size="11">0</text>
  <text x="660" y="80" text-anchor="middle" fill="#777" font-size="11">4</text>

  <circle cx="205" cy="58" r="13" fill="#e07b39"/>
  <circle cx="245" cy="58" r="13" fill="#6abf69"/>
  <circle cx="310" cy="58" r="13" fill="#c8d44e"/>
  <circle cx="470" cy="58" r="13" fill="#e680a0"/>
  <circle cx="515" cy="58" r="13" fill="#6ec6e8"/>
  <circle cx="555" cy="58" r="13" fill="#aaaaaa"/>
  <circle cx="595" cy="58" r="13" fill="#e680a0" opacity="0.6"/>

  <!-- mean (faint) on original -->
  <line x1="400" y1="40" x2="400" y2="76" stroke="#e05555" stroke-width="2" opacity="0.3" stroke-dasharray="5,3"/>

  <!-- drop arrows -->
  <g stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4,3" fill="none">
    <line x1="245" y1="71" x2="230" y2="128"/>
    <line x1="310" y1="71" x2="298" y2="128"/>
    <line x1="470" y1="71" x2="470" y2="128"/>
    <line x1="515" y1="71" x2="515" y2="128"/>
    <line x1="555" y1="71" x2="555" y2="128"/>
    <line x1="595" y1="71" x2="595" y2="128"/>
  </g>
  <g fill="#cc4444">
    <polygon points="230,131 225,122 235,122"/>
    <polygon points="298,131 293,122 303,122"/>
    <polygon points="470,131 465,122 475,122"/>
    <polygon points="515,131 510,122 520,122"/>
    <polygon points="555,131 550,122 560,122"/>
    <polygon points="595,131 590,122 600,122"/>
  </g>

  <!-- ─── BOOTSTRAP SAMPLE ─── -->
  <text x="24" y="160" fill="#ccc" font-size="13" font-weight="bold">Bootstrap</text>
  <line x1="130" y1="148" x2="660" y2="148" stroke="#4a9a6a" stroke-width="2.5"/>
  <line x1="130" y1="140" x2="130" y2="156" stroke="#4a9a6a" stroke-width="2"/>
  <line x1="395" y1="140" x2="395" y2="156" stroke="#777" stroke-width="1.5"/>
  <line x1="660" y1="140" x2="660" y2="156" stroke="#4a9a6a" stroke-width="2"/>
  <text x="130" y="170" text-anchor="middle" fill="#777" font-size="11">−4</text>
  <text x="395" y="170" text-anchor="middle" fill="#777" font-size="11">0</text>
  <text x="660" y="170" text-anchor="middle" fill="#777" font-size="11">4</text>

  <!-- resampled: green doubled, orange gone -->
  <circle cx="230" cy="148" r="13" fill="#6abf69"/>
  <circle cx="298" cy="148" r="13" fill="#c8d44e"/>
  <circle cx="470" cy="148" r="13" fill="#e680a0"/>
  <circle cx="515" cy="148" r="13" fill="#6ec6e8"/>
  <circle cx="555" cy="148" r="13" fill="#aaaaaa"/>
  <circle cx="595" cy="148" r="13" fill="#e680a0" opacity="0.6"/>
  <!-- mean marker -->
  <line x1="470" y1="128" x2="470" y2="168" stroke="#e05555" stroke-width="3"/>

  <!-- ─── 4 Steps (right panel) ─── -->
  <text x="690" y="38" fill="#fff" font-size="14" font-weight="bold">Bootstrapping: 3 steps</text>

  <text x="690" y="72" fill="#f0a050" font-size="13" font-weight="bold">1) Make a Bootstrapped Dataset</text>
  <!-- arrow to bootstrap line -->
  <line x1="685" y1="68" x2="665" y2="148" stroke="#f0a050" stroke-width="1.5" marker-end="url(#a1)"/>

  <text x="690" y="128" fill="#f0a050" font-size="13" font-weight="bold">2) Calculate <tspan font-style="italic">something</tspan></text>
  <text x="700" y="146" fill="#f0a050" font-size="12">(here: the mean)</text>
  <!-- arrow to mean marker -->
  <line x1="685" y1="130" x2="475" y2="148" stroke="#f0a050" stroke-width="1.5" marker-end="url(#a1)"/>

  <text x="690" y="188" fill="#f0a050" font-size="13" font-weight="bold">3) Keep track of that</text>
  <text x="700" y="206" fill="#f0a050" font-size="13" font-style="italic">calculation</text>

  <!-- ─── Histogram of means ─── -->
  <text x="24" y="218" fill="#ccc" font-size="12">Repeat steps 1–3 many times → distribution of the statistic:</text>
  <line x1="130" y1="320" x2="660" y2="320" stroke="#555" stroke-width="1.5"/>
  <text x="130" y="334" text-anchor="middle" fill="#777" font-size="11">−4</text>
  <text x="395" y="334" text-anchor="middle" fill="#777" font-size="11">0</text>
  <text x="660" y="334" text-anchor="middle" fill="#777" font-size="11">4</text>

  <rect x="308" y="309" width="16" height="11" fill="#6abf69" opacity="0.7"/>
  <rect x="326" y="300" width="16" height="20" fill="#6abf69" opacity="0.7"/>
  <rect x="344" y="288" width="16" height="32" fill="#6abf69" opacity="0.8"/>
  <rect x="362" y="276" width="16" height="44" fill="#6abf69" opacity="0.85"/>
  <rect x="380" y="268" width="16" height="52" fill="#6abf69"/>
  <rect x="398" y="263" width="16" height="57" fill="#6abf69"/>
  <rect x="416" y="268" width="16" height="52" fill="#6abf69"/>
  <rect x="434" y="278" width="16" height="42" fill="#6abf69" opacity="0.85"/>
  <rect x="452" y="292" width="16" height="28" fill="#6abf69" opacity="0.75"/>
  <rect x="470" y="306" width="16" height="14" fill="#6abf69" opacity="0.65"/>

  <!-- SE bracket -->
  <line x1="344" y1="258" x2="470" y2="258" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="407" y="255" text-anchor="middle" fill="#e05555" font-size="11">≈ SE</text>

  <defs>
    <marker id="a1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0a050"/>
    </marker>
  </defs>
</svg>
