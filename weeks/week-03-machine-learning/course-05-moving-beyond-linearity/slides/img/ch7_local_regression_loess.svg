<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Georgia, serif">
  <rect width="800" height="440" fill="#fafafa" rx="8"/>

  <!-- Title row -->
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Local regression</text>
  <text x="400" y="44" text-anchor="middle" font-size="11.5" fill="#444" font-style="italic">Idea: fit regression models in small localized regions using only nearby data</text>

  <!-- ── LEFT PANEL ── -->
  <g transform="translate(30,55)">
    <!-- Axes -->
    <line x1="55" y1="295" x2="340" y2="295" stroke="#333" stroke-width="1.4"/>
    <line x1="55" y1="295" x2="55"  y2="20"  stroke="#333" stroke-width="1.4"/>
    <!-- X ticks -->
    <g font-size="9.5" fill="#555" text-anchor="middle">
      <line x1="55"  y1="295" x2="55"  y2="300" stroke="#333"/>
      <line x1="112" y1="295" x2="112" y2="300" stroke="#333"/>
      <line x1="169" y1="295" x2="169" y2="300" stroke="#333"/>
      <line x1="226" y1="295" x2="226" y2="300" stroke="#333"/>
      <line x1="283" y1="295" x2="283" y2="300" stroke="#333"/>
      <line x1="340" y1="295" x2="340" y2="300" stroke="#333"/>
      <text x="55"  y="311">0.0</text>
      <text x="112" y="311">0.2</text>
      <text x="169" y="311">0.4</text>
      <text x="226" y="311">0.6</text>
      <text x="283" y="311">0.8</text>
      <text x="340" y="311">1.0</text>
    </g>
    <!-- Y ticks -->
    <g font-size="9.5" fill="#555" text-anchor="end">
      <line x1="55" y1="295" x2="50" y2="295" stroke="#333"/>
      <line x1="55" y1="247" x2="50" y2="247" stroke="#333"/>
      <line x1="55" y1="199" x2="50" y2="199" stroke="#333"/>
      <line x1="55" y1="151" x2="50" y2="151" stroke="#333"/>
      <line x1="55" y1="103" x2="50" y2="103" stroke="#333"/>
      <line x1="55" y1="55"  x2="50" y2="55"  stroke="#333"/>
      <text x="49" y="299">−1.0</text>
      <text x="49" y="251">−0.5</text>
      <text x="49" y="203">0.0</text>
      <text x="49" y="155">0.5</text>
      <text x="49" y="107">1.0</text>
      <text x="49" y="59">1.5</text>
    </g>

    <!-- Green window (x₀ ≈ 0.15) -->
    <rect x="55" y="25" width="60" height="270" fill="#90ee90" fill-opacity="0.38" stroke="#5a9e5a" stroke-width="1" stroke-dasharray="4,2"/>

    <!-- Query point line -->
    <line x1="78" y1="20" x2="78" y2="295" stroke="#cc6600" stroke-width="1.4" stroke-dasharray="5,3"/>

    <!-- Outside scatter (grey) -->
    <g fill="none" stroke="#bbb" stroke-width="1.2">
      <circle cx="122" cy="128" r="3.5"/>
      <circle cx="135" cy="116" r="3.5"/>
      <circle cx="148" cy="122" r="3.5"/>
      <circle cx="161" cy="108" r="3.5"/>
      <circle cx="174" cy="114" r="3.5"/>
      <circle cx="187" cy="100" r="3.5"/>
      <circle cx="200" cy="108" r="3.5"/>
      <circle cx="213" cy="97"  r="3.5"/>
      <circle cx="226" cy="106" r="3.5"/>
      <circle cx="239" cy="116" r="3.5"/>
      <circle cx="252" cy="124" r="3.5"/>
      <circle cx="265" cy="134" r="3.5"/>
      <circle cx="278" cy="145" r="3.5"/>
      <circle cx="291" cy="158" r="3.5"/>
      <circle cx="304" cy="174" r="3.5"/>
      <circle cx="317" cy="191" r="3.5"/>
      <circle cx="330" cy="210" r="3.5"/>
      <circle cx="340" cy="226" r="3.5"/>
    </g>

    <!-- Window scatter (orange) -->
    <g fill="none" stroke="#cc6600" stroke-width="1.5">
      <circle cx="57"  cy="170" r="3.5"/>
      <circle cx="63"  cy="156" r="3.5"/>
      <circle cx="69"  cy="164" r="3.5"/>
      <circle cx="74"  cy="144" r="3.5"/>
      <circle cx="79"  cy="135" r="3.5"/>
      <circle cx="84"  cy="152" r="3.5"/>
      <circle cx="89"  cy="129" r="3.5"/>
      <circle cx="95"  cy="140" r="3.5"/>
      <circle cx="101" cy="132" r="3.5"/>
      <circle cx="107" cy="143" r="3.5"/>
      <circle cx="112" cy="127" r="3.5"/>
    </g>

    <!-- LOESS curve (blue) -->
    <path d="M55,199 C75,183 100,158 130,134 C170,104 210,97 250,108 C285,118 310,160 330,210 C338,228 340,236 340,240"
          fill="none" stroke="#3366bb" stroke-width="2.2"/>

    <!-- Local line of best fit (orange) -->
    <line x1="55" y1="175" x2="120" y2="122" stroke="#cc6600" stroke-width="2.2"/>

    <!-- Annotations -->
    <text x="-30" y="92"  font-size="9.5" fill="#cc6600" font-weight="bold">These points</text>
    <text x="-30" y="103" font-size="9.5" fill="#cc6600" font-weight="bold">contribute</text>
    <text x="-30" y="114" font-size="9.5" fill="#cc6600" font-weight="bold">to the fit.</text>
    <line x1="24" y1="104" x2="68" y2="148" stroke="#cc6600" stroke-width="1" marker-end="url(#ao)"/>

    <text x="-30" y="140" font-size="9.5" fill="#cc6600" font-style="italic">Local line of</text>
    <text x="-30" y="151" font-size="9.5" fill="#cc6600" font-style="italic">best fit</text>
    <line x1="24" y1="146" x2="65" y2="152" stroke="#cc6600" stroke-width="1" marker-end="url(#ao)"/>

    <text x="57"  y="280" font-size="9"   fill="#3a7a3a" font-weight="bold">Weighting scheme for</text>
    <text x="57"  y="291" font-size="9"   fill="#3a7a3a" font-weight="bold">weighted least squares</text>

    <text x="190" y="87"  font-size="9.5" fill="#999">These points</text>
    <text x="190" y="98"  font-size="9.5" fill="#999">are left out.</text>
    <line x1="222" y1="100" x2="185" y2="120" stroke="#999" stroke-width="1" marker-end="url(#ag)"/>

    <!-- Legend for left panel -->
    <line x1="175" y1="270" x2="200" y2="270" stroke="#cc6600" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="205" y="274" font-size="9" fill="#cc6600">Estimate</text>
    <line x1="175" y1="283" x2="200" y2="283" stroke="#3366bb" stroke-width="2"/>
    <text x="205" y="287" font-size="9" fill="#3366bb">Truth</text>

    <!-- Caption -->
    <text x="197" y="325" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Figure 7.9 (ISLR)</text>
  </g>

  <!-- ── RIGHT PANEL ── -->
  <g transform="translate(420,55)">
    <!-- Axes -->
    <line x1="30" y1="295" x2="315" y2="295" stroke="#333" stroke-width="1.4"/>
    <line x1="30" y1="295" x2="30"  y2="20"  stroke="#333" stroke-width="1.4"/>
    <!-- X ticks -->
    <g font-size="9.5" fill="#555" text-anchor="middle">
      <line x1="30"  y1="295" x2="30"  y2="300" stroke="#333"/>
      <line x1="87"  y1="295" x2="87"  y2="300" stroke="#333"/>
      <line x1="144" y1="295" x2="144" y2="300" stroke="#333"/>
      <line x1="201" y1="295" x2="201" y2="300" stroke="#333"/>
      <line x1="258" y1="295" x2="258" y2="300" stroke="#333"/>
      <line x1="315" y1="295" x2="315" y2="300" stroke="#333"/>
      <text x="30"  y="311">0.0</text>
      <text x="87"  y="311">0.2</text>
      <text x="144" y="311">0.4</text>
      <text x="201" y="311">0.6</text>
      <text x="258" y="311">0.8</text>
      <text x="315" y="311">1.0</text>
    </g>
    <!-- Y ticks -->
    <g font-size="9.5" fill="#555" text-anchor="end">
      <line x1="30" y1="295" x2="25" y2="295" stroke="#333"/>
      <line x1="30" y1="247" x2="25" y2="247" stroke="#333"/>
      <line x1="30" y1="199" x2="25" y2="199" stroke="#333"/>
      <line x1="30" y1="151" x2="25" y2="151" stroke="#333"/>
      <line x1="30" y1="103" x2="25" y2="103" stroke="#333"/>
      <line x1="30" y1="55"  x2="25" y2="55"  stroke="#333"/>
      <text x="24" y="299">−1.0</text>
      <text x="24" y="251">−0.5</text>
      <text x="24" y="203">0.0</text>
      <text x="24" y="155">0.5</text>
      <text x="24" y="107">1.0</text>
      <text x="24" y="59">1.5</text>
    </g>

    <!-- Green window (x₀ ≈ 0.45, middle of plot) -->
    <rect x="116" y="25" width="68" height="270" fill="#90ee90" fill-opacity="0.38" stroke="#5a9e5a" stroke-width="1" stroke-dasharray="4,2"/>

    <!-- Query point line -->
    <line x1="152" y1="20" x2="152" y2="295" stroke="#cc6600" stroke-width="1.4" stroke-dasharray="5,3"/>

    <!-- All scatter points grey (window = orange) -->
    <g fill="none" stroke="#bbb" stroke-width="1.2">
      <circle cx="32"  cy="185" r="3.5"/>
      <circle cx="42"  cy="172" r="3.5"/>
      <circle cx="52"  cy="164" r="3.5"/>
      <circle cx="62"  cy="150" r="3.5"/>
      <circle cx="72"  cy="140" r="3.5"/>
      <circle cx="82"  cy="130" r="3.5"/>
      <circle cx="93"  cy="122" r="3.5"/>
      <circle cx="104" cy="112" r="3.5"/>
      <circle cx="210" cy="95"  r="3.5"/>
      <circle cx="222" cy="104" r="3.5"/>
      <circle cx="235" cy="116" r="3.5"/>
      <circle cx="247" cy="130" r="3.5"/>
      <circle cx="260" cy="148" r="3.5"/>
      <circle cx="272" cy="166" r="3.5"/>
      <circle cx="285" cy="188" r="3.5"/>
      <circle cx="297" cy="212" r="3.5"/>
      <circle cx="308" cy="236" r="3.5"/>
      <circle cx="315" cy="250" r="3.5"/>
    </g>

    <!-- Window scatter (orange) -->
    <g fill="none" stroke="#cc6600" stroke-width="1.5">
      <circle cx="118" cy="104" r="3.5"/>
      <circle cx="126" cy="96"  r="3.5"/>
      <circle cx="134" cy="90"  r="3.5"/>
      <circle cx="142" cy="83"  r="3.5"/>
      <circle cx="150" cy="79"  r="3.5"/>
      <circle cx="158" cy="82"  r="3.5"/>
      <circle cx="166" cy="88"  r="3.5"/>
      <circle cx="174" cy="95"  r="3.5"/>
      <circle cx="182" cy="104" r="3.5"/>
    </g>

    <!-- LOESS curve (blue) -->
    <path d="M30,199 C60,175 90,148 120,118 C150,91 180,82 210,95 C245,111 270,148 295,200 C308,228 313,248 315,254"
          fill="none" stroke="#3366bb" stroke-width="2.2"/>

    <!-- Local line of best fit (orange, around x₀=0.45) -->
    <line x1="112" y1="112" x2="192" y2="96" stroke="#cc6600" stroke-width="2.2"/>

    <!-- Legend -->
    <line x1="155" y1="270" x2="180" y2="270" stroke="#cc6600" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="185" y="274" font-size="9" fill="#cc6600">Estimate</text>
    <line x1="155" y1="283" x2="180" y2="283" stroke="#3366bb" stroke-width="2"/>
    <text x="185" y="287" font-size="9" fill="#3366bb">Truth</text>

    <!-- LOESS label -->
    <text x="172" y="335" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">LOESS = locally estimated</text>
    <text x="172" y="350" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">scatterplot smoothing</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="ao" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#cc6600"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#999"/>
    </marker>
  </defs>
</svg>
