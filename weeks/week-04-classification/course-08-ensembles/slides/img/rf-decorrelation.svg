<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 290" width="560" height="290" font-family="sans-serif">
  <rect width="560" height="290" fill="#fafafa"/>

  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">
    Random Forests: decorrelation via random feature subsets
  </text>

  <!-- ── LEFT PANEL: Bagging (all features) ── -->
  <rect x="20" y="38" width="240" height="220" rx="8" fill="#fff" stroke="#90caf9" stroke-width="2"/>
  <text x="140" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Bagging  (m = p)</text>
  <text x="140" y="74" text-anchor="middle" font-size="10" fill="#555">all features eligible at every split</text>

  <!-- Feature list -->
  <g font-size="11" text-anchor="middle">
    <rect x="60"  y="85" width="50" height="22" rx="4" fill="#1565c0"/>
    <text x="85"  y="101" fill="white" font-weight="bold">X₁ ★</text>
    <rect x="120" y="85" width="50" height="22" rx="4" fill="#1565c0"/>
    <text x="145" y="101" fill="white">X₂</text>
    <rect x="180" y="85" width="50" height="22" rx="4" fill="#1565c0"/>
    <text x="205" y="101" fill="white">X₃</text>
  </g>
  <text x="140" y="126" text-anchor="middle" font-size="10" fill="#555">Split always picks X₁ (strongest)</text>

  <!-- Tree 1 (dominated by X1) -->
  <!-- root -->
  <rect x="90" y="140" width="100" height="28" rx="5" fill="#1565c0" opacity="0.85"/>
  <text x="140" y="159" text-anchor="middle" font-size="11" fill="white">X₁ ≤ 2.1?</text>
  <line x1="115" y1="168" x2="100" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="165" y1="168" x2="180" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="60"  y="188" width="80" height="26" rx="4" fill="#1565c0" opacity="0.7"/>
  <text x="100" y="205" text-anchor="middle" font-size="10" fill="white">X₁ ≤ 0.5?</text>
  <rect x="140" y="188" width="80" height="26" rx="4" fill="#1565c0" opacity="0.7"/>
  <text x="180" y="205" text-anchor="middle" font-size="10" fill="white">X₁ ≤ 3.7?</text>

  <text x="140" y="240" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">All trees look alike → high ρ</text>
  <text x="140" y="255" text-anchor="middle" font-size="10" fill="#e53935">ρ ≈ 0.8 → Var → ρσ² = 0.8σ²</text>

  <!-- Divider -->
  <line x1="280" y1="38" x2="280" y2="258" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ── RIGHT PANEL: Random Forest (m = √p) ── -->
  <rect x="300" y="38" width="240" height="220" rx="8" fill="#fff" stroke="#a5d6a7" stroke-width="2"/>
  <text x="420" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Random Forest  (m = √p)</text>
  <text x="420" y="74" text-anchor="middle" font-size="10" fill="#555">random subset of m features per split</text>

  <!-- Feature subset — split 1 -->
  <text x="330" y="92" font-size="10" fill="#555">Split 1 candidates:</text>
  <g font-size="11" text-anchor="middle">
    <rect x="310" y="96" width="50" height="22" rx="4" fill="#bbdefb" stroke="#90caf9"/>
    <text x="335" y="112" fill="#555">X₂</text>
    <rect x="370" y="96" width="50" height="22" rx="4" fill="#bbdefb" stroke="#90caf9"/>
    <text x="395" y="112" fill="#555">X₃</text>
    <rect x="430" y="96" width="50" height="22" rx="4" fill="#aaa" opacity="0.3"/>
    <text x="455" y="112" fill="#aaa">X₁</text>
    <text x="455" y="130" fill="#aaa" font-size="9">(excluded)</text>
  </g>

  <!-- Tree 1 root (different feature) -->
  <rect x="370" y="140" width="100" height="28" rx="5" fill="#2e7d32" opacity="0.85"/>
  <text x="420" y="159" text-anchor="middle" font-size="11" fill="white">X₃ ≤ 1.4?</text>
  <line x1="395" y1="168" x2="380" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="445" y1="168" x2="460" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="340" y="188" width="80" height="26" rx="4" fill="#2e7d32" opacity="0.7"/>
  <text x="380" y="205" text-anchor="middle" font-size="10" fill="white">X₁ ≤ 1.2?</text>
  <rect x="420" y="188" width="80" height="26" rx="4" fill="#2e7d32" opacity="0.7"/>
  <text x="460" y="205" text-anchor="middle" font-size="10" fill="white">X₂ ≤ 0.9?</text>

  <text x="420" y="240" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">Trees use different features → low ρ</text>
  <text x="420" y="255" text-anchor="middle" font-size="10" fill="#2e7d32">ρ ≈ 0.3 → Var → ρσ² = 0.3σ²</text>

  <!-- Bottom comparison -->
  <rect x="20" y="265" width="520" height="22" rx="5" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="280" y="280" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">
    Decorrelation (smaller ρ) is why RF outperforms bagging without changing B
  </text>
</svg>
