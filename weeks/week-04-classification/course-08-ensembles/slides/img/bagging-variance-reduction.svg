<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 300" width="540" height="300" font-family="sans-serif">
  <rect width="540" height="300" fill="#fafafa"/>

  <!-- Title -->
  <text x="270" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">
    OOB: each bootstrap sample leaves ~37% out-of-bag
  </text>

  <!-- Training set: 10 rows -->
  <text x="60" y="50" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Training data (n=10)</text>
  <rect x="20" y="58" width="80" height="190" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <!-- Row labels -->
  <g fill="#1565c0" font-size="11" text-anchor="middle">
    <text x="60" y="76">x₁</text><text x="60" y="94">x₂</text>
    <text x="60" y="112">x₃</text><text x="60" y="130">x₄</text>
    <text x="60" y="148">x₅</text><text x="60" y="166">x₆</text>
    <text x="60" y="184">x₇</text><text x="60" y="202">x₈</text>
    <text x="60" y="220">x₉</text><text x="60" y="238">x₁₀</text>
  </g>

  <!-- Arrows to 3 bootstrap samples -->
  <line x1="100" y1="153" x2="148" y2="120" stroke="#90caf9" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="153" x2="148" y2="165" stroke="#90caf9" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="153" x2="148" y2="210" stroke="#90caf9" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#90caf9"/>
    </marker>
  </defs>

  <!-- Bootstrap sample 1 -->
  <rect x="148" y="62" width="100" height="110" rx="5" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="198" y="78" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Bootstrap 1</text>
  <text x="198" y="93"  text-anchor="middle" font-size="10" fill="#e65100">x₁ x₁ x₃ x₅ x₇ x₉ …</text>
  <text x="198" y="108" text-anchor="middle" font-size="10" fill="#888">(63% unique)</text>
  <!-- OOB badge -->
  <rect x="148" y="178" width="100" height="24" rx="4" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1"/>
  <text x="198" y="194" text-anchor="middle" font-size="10" fill="#c62828">OOB: x₂, x₄, x₆ …</text>

  <!-- Bootstrap sample 2 -->
  <rect x="268" y="132" width="100" height="66" rx="5" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="318" y="148" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Bootstrap 2</text>
  <text x="318" y="163" text-anchor="middle" font-size="10" fill="#e65100">x₂ x₂ x₄ x₆ x₈ …</text>
  <rect x="268" y="204" width="100" height="24" rx="4" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1"/>
  <text x="318" y="220" text-anchor="middle" font-size="10" fill="#c62828">OOB: x₁, x₃, x₅ …</text>

  <!-- Bootstrap sample 3 -->
  <rect x="268" y="62" width="100" height="60" rx="5" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="318" y="78" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Bootstrap 3</text>
  <text x="318" y="93" text-anchor="middle" font-size="10" fill="#e65100">x₃ x₅ x₇ x₉ x₁₀ …</text>

  <!-- Arrows: bootstrap → tree -->
  <line x1="248" y1="117" x2="385" y2="148" stroke="#ffb74d" stroke-width="1.5"/>
  <line x1="368" y1="165" x2="385" y2="165" stroke="#ffb74d" stroke-width="1.5"/>
  <line x1="368" y1="92"  x2="385" y2="148" stroke="#ffb74d" stroke-width="1.5"/>

  <!-- Trees -->
  <rect x="385" y="110" width="70" height="110" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5"/>
  <text x="420" y="130" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">Tree 1</text>
  <text x="420" y="150" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">Tree 2</text>
  <text x="420" y="170" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">Tree 3</text>
  <text x="420" y="190" text-anchor="middle" font-size="10" fill="#888">⋮</text>
  <text x="420" y="210" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">Tree B</text>

  <!-- Arrow to Average -->
  <line x1="455" y1="165" x2="483" y2="165" stroke="#81c784" stroke-width="2"/>
  <polygon points="483,160 490,165 483,170" fill="#81c784"/>

  <!-- Average box -->
  <rect x="490" y="140" width="42" height="50" rx="5" fill="#1b5e20" stroke="#1b5e20"/>
  <text x="511" y="162" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Avg</text>
  <text x="511" y="178" text-anchor="middle" font-size="9"  fill="#c8e6c9">f̂(x)</text>

  <!-- OOB score label -->
  <text x="270" y="275" text-anchor="middle" font-size="11" fill="#c62828">
    OOB error: score each xᵢ using only trees for which xᵢ was out-of-bag
  </text>
</svg>
