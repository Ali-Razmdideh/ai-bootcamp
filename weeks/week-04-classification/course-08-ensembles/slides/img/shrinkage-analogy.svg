<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 270" width="560" height="270" font-family="sans-serif">
  <rect width="560" height="270" fill="#fafafa"/>

  <defs>
    <marker id="arrs" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#555"/>
    </marker>
    <marker id="arrl" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#e53935"/>
    </marker>
    <marker id="arrs2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#1e88e5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">
    Shrinkage λ: step size toward the target
  </text>

  <!-- ── TOP: Large λ (overshooting) ── -->
  <text x="30" y="50" font-size="12" font-weight="bold" fill="#e53935">Large λ = 0.5 — overshoots, oscillates</text>

  <!-- Number line -->
  <line x1="50" y1="90" x2="510" y2="90" stroke="#ccc" stroke-width="2"/>
  <!-- Ticks -->
  <g font-size="10" text-anchor="middle" fill="#888">
    <line x1="50"  y1="86" x2="50"  y2="94" stroke="#888"/>  <text x="50"  y="105">0</text>
    <line x1="165" y1="86" x2="165" y2="94" stroke="#888"/>  <text x="165" y="105">0.25</text>
    <line x1="280" y1="86" x2="280" y2="94" stroke="#888"/>  <text x="280" y="105">0.5</text>
    <line x1="395" y1="86" x2="395" y2="94" stroke="#888"/>  <text x="395" y="105">0.75</text>
    <line x1="510" y1="86" x2="510" y2="94" stroke="#888"/>  <text x="510" y="105">1.0</text>
  </g>

  <!-- Target star at 0.75 (x=395) -->
  <text x="395" y="72" text-anchor="middle" font-size="18" fill="#2e7d32">★</text>
  <text x="395" y="65" text-anchor="middle" font-size="9" fill="#2e7d32">target</text>

  <!-- Large step arrows: 0 → 1.0 → 0.5 → 0.85 → 0.65 → ... -->
  <!-- Step 1: from x=50 to x=510 (overshoot from 0→1.0) -->
  <path d="M 50,80 Q 280,45 510,80" fill="none" stroke="#e53935" stroke-width="2"
        marker-end="url(#arrl)" opacity="0.9"/>
  <text x="280" y="40" text-anchor="middle" font-size="9" fill="#e53935">step 1: +λT̂¹ → overshoots!</text>

  <!-- Step 2: from x=510 back to x=280 -->
  <path d="M 510,82 Q 400,115 280,82" fill="none" stroke="#e53935" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrl)" opacity="0.7"/>
  <text x="400" y="128" text-anchor="middle" font-size="9" fill="#e53935">step 2: overshoots back</text>

  <!-- ── BOTTOM: Small λ (steady approach) ── -->
  <text x="30" y="155" font-size="12" font-weight="bold" fill="#1e88e5">Small λ = 0.05 — steady, converges safely</text>

  <!-- Number line -->
  <line x1="50" y1="195" x2="510" y2="195" stroke="#ccc" stroke-width="2"/>
  <g font-size="10" text-anchor="middle" fill="#888">
    <line x1="50"  y1="191" x2="50"  y2="199" stroke="#888"/>  <text x="50"  y="210">0</text>
    <line x1="165" y1="191" x2="165" y2="199" stroke="#888"/>  <text x="165" y="210">0.25</text>
    <line x1="280" y1="191" x2="280" y2="199" stroke="#888"/>  <text x="280" y="210">0.5</text>
    <line x1="395" y1="191" x2="395" y2="199" stroke="#888"/>  <text x="395" y="210">0.75</text>
    <line x1="510" y1="191" x2="510" y2="199" stroke="#888"/>  <text x="510" y="210">1.0</text>
  </g>

  <!-- Target at same position -->
  <text x="395" y="178" text-anchor="middle" font-size="18" fill="#2e7d32">★</text>

  <!-- Small steps: 5 arrows marching toward target -->
  <!-- positions: 50, 96, 142, 188, 234, 280 (each +46 = +0.1 in [0,460]) -->
  <line x1="50"  y1="195" x2="92"  y2="195" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrs2)"/>
  <line x1="96"  y1="195" x2="138" y2="195" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrs2)"/>
  <line x1="142" y1="195" x2="184" y2="195" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrs2)"/>
  <line x1="188" y1="195" x2="230" y2="195" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrs2)"/>
  <line x1="234" y1="195" x2="276" y2="195" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrs2)"/>
  <text x="165" y="182" text-anchor="middle" font-size="9" fill="#1e88e5">each step: +λT̂ᵇ</text>
  <text x="380" y="225" font-size="9" fill="#1e88e5">… B steps later → converges on target ★</text>

  <!-- Bottom note -->
  <rect x="20" y="243" width="520" height="22" rx="5" fill="#e3f2fd" stroke="#90caf9"/>
  <text x="280" y="258" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">
    Rule: λ = 0.01–0.05, then find optimal B by early stopping on a validation set
  </text>
</svg>
