<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 310" width="560" height="310" font-family="sans-serif">
  <rect width="560" height="310" fill="#fafafa"/>
  <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">
    Boosting: sequential residual fitting
  </text>

  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="3" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 0 -->
  <rect x="20" y="45" width="95" height="55" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="67" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Start</text>
  <text x="67" y="84" text-anchor="middle" font-size="10" fill="#1565c0">f̂(x) = 0</text>
  <text x="67" y="98" text-anchor="middle" font-size="10" fill="#1565c0">r = y</text>

  <!-- Arrow 0→1 -->
  <line x1="115" y1="72" x2="140" y2="72" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tree 1 box -->
  <rect x="140" y="45" width="95" height="55" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="187" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Fit tree T̂¹</text>
  <text x="187" y="81" text-anchor="middle" font-size="10" fill="#e65100">on residuals r</text>
  <text x="187" y="97" text-anchor="middle" font-size="10" fill="#888">(d splits)</text>

  <!-- Update arrow down -->
  <line x1="187" y1="100" x2="187" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Update box 1 -->
  <rect x="140" y="125" width="95" height="65" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="187" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Update</text>
  <text x="187" y="160" text-anchor="middle" font-size="10" fill="#2e7d32">f̂ ← f̂ + λT̂¹</text>
  <text x="187" y="175" text-anchor="middle" font-size="10" fill="#2e7d32">r ← r − λT̂¹</text>
  <text x="187" y="188" text-anchor="middle" font-size="9"  fill="#888">(small λ!)</text>

  <!-- Arrow 1→2 -->
  <line x1="235" y1="157" x2="265" y2="157" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tree 2 box -->
  <rect x="265" y="130" width="95" height="55" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="312" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Fit tree T̂²</text>
  <text x="312" y="166" text-anchor="middle" font-size="10" fill="#e65100">on new residuals</text>
  <text x="312" y="180" text-anchor="middle" font-size="10" fill="#888">(same depth d)</text>

  <!-- Update arrow down -->
  <line x1="312" y1="185" x2="312" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Update box 2 -->
  <rect x="265" y="210" width="95" height="50" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="312" y="230" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Update again</text>
  <text x="312" y="246" text-anchor="middle" font-size="10" fill="#2e7d32">f̂ += λT̂²; r -= λT̂²</text>

  <!-- Dots for continuation -->
  <text x="395" y="170" font-size="20" fill="#555">…</text>

  <!-- Tree B box -->
  <rect x="420" y="130" width="95" height="55" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="467" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Fit tree T̂ᴮ</text>
  <text x="467" y="166" text-anchor="middle" font-size="10" fill="#e65100">on residuals</text>

  <!-- Arrow B→Final -->
  <line x1="467" y1="185" x2="467" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Final prediction box -->
  <rect x="390" y="210" width="150" height="50" rx="6" fill="#1a237e" stroke="#1a237e"/>
  <text x="465" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Final: f̂(x)</text>
  <text x="465" y="250" text-anchor="middle" font-size="10" fill="#9fa8da">= Σᵦ λ T̂ᵇ(x)</text>

  <!-- Bottom legend -->
  <rect x="20" y="250" width="340" height="45" rx="5" fill="#f3f4f6" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="268" font-size="10" fill="#333"><tspan font-weight="bold">Key:</tspan>  λ (learning_rate) = 0.01–0.1  ·  d (max_depth) = 1–4  ·  B (n_estimators) = 100–500</text>
  <text x="30" y="284" font-size="10" fill="#c62828">Small λ + large B outperforms large λ + small B</text>
</svg>
