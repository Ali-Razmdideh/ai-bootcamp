<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" font-family="sans-serif">
  <rect width="480" height="300" fill="#fafafa"/>

  <!-- Axes -->
  <line x1="60" y1="240" x2="430" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="30"  x2="60"  y2="240" stroke="#333" stroke-width="1.5"/>

  <!-- CV error curve (hand-drawn style U-ish) -->
  <!-- Points: alpha increases left to right; CV MSE decreases then rises -->
  <polyline
    points="70,50 100,48 130,47 160,47 195,50 230,60 265,75 300,100 340,130 380,170 415,210"
    fill="none" stroke="#2979ff" stroke-width="2.5"/>

  <!-- Error bars (simplified) -->
  <line x1="160" y1="42" x2="160" y2="52" stroke="#2979ff" stroke-width="1" opacity="0.5"/>
  <line x1="195" y1="44" x2="195" y2="56" stroke="#2979ff" stroke-width="1" opacity="0.5"/>
  <line x1="230" y1="54" x2="230" y2="66" stroke="#2979ff" stroke-width="1" opacity="0.5"/>

  <!-- Best alpha vertical line -->
  <line x1="160" y1="30" x2="160" y2="240" stroke="#e53935" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="162" y="45" font-size="11" fill="#e53935">α* (CV-optimal)</text>

  <!-- Dots on curve -->
  <circle cx="70"  cy="50"  r="3" fill="#2979ff"/>
  <circle cx="100" cy="48"  r="3" fill="#2979ff"/>
  <circle cx="130" cy="47"  r="3" fill="#2979ff"/>
  <circle cx="160" cy="47"  r="5" fill="#e53935"/>
  <circle cx="195" cy="50"  r="3" fill="#2979ff"/>
  <circle cx="230" cy="60"  r="3" fill="#2979ff"/>
  <circle cx="265" cy="75"  r="3" fill="#2979ff"/>
  <circle cx="300" cy="100" r="3" fill="#2979ff"/>
  <circle cx="340" cy="130" r="3" fill="#2979ff"/>
  <circle cx="380" cy="170" r="3" fill="#2979ff"/>
  <circle cx="415" cy="210" r="3" fill="#2979ff"/>

  <!-- Annotations -->
  <text x="75"  y="65" font-size="10" fill="#555">full tree</text>
  <text x="390" y="205" font-size="10" fill="#555">stump</text>

  <!-- Axis labels -->
  <text x="245" y="268" text-anchor="middle" font-size="12" fill="#333">α (complexity penalty)</text>
  <text x="20" y="140" text-anchor="middle" font-size="12" fill="#333"
        transform="rotate(-90,20,140)">5-fold CV MSE</text>

  <!-- X ticks -->
  <text x="60"  y="253" text-anchor="middle" font-size="9" fill="#888">0</text>
  <text x="160" y="253" text-anchor="middle" font-size="9" fill="#e53935">α*</text>
  <text x="415" y="253" text-anchor="middle" font-size="9" fill="#888">large</text>

  <!-- Title -->
  <text x="245" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">
    Cost-complexity pruning path
  </text>
</svg>
