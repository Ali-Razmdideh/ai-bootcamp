<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="520" height="320" fill="#f8f9fa"/>

  <!-- grid lines -->
  <line x1="70" y1="40"  x2="460" y2="40"  stroke="#e0e0e0" stroke-width="1"/>
  <line x1="70" y1="95"  x2="460" y2="95"  stroke="#e0e0e0" stroke-width="1"/>
  <line x1="70" y1="150" x2="460" y2="150" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="70" y1="205" x2="460" y2="205" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="70" y1="255" x2="460" y2="255" stroke="#e0e0e0" stroke-width="1"/>

  <!-- axes -->
  <line x1="70" y1="255" x2="460" y2="255" stroke="#555" stroke-width="1.8"/>
  <line x1="70" y1="40"  x2="70"  y2="255" stroke="#555" stroke-width="1.8"/>

  <!-- CV MSE curve — U-shape -->
  <polyline
    points="80,220 100,175 125,125 155,85 180,68 205,60 230,57 258,58 280,63 305,75 330,95 360,122 390,155 420,185 450,215"
    fill="none" stroke="#2979ff" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- shaded confidence band (simplified) -->
  <polyline
    points="80,230 100,185 125,135 155,95 180,78 205,70 230,67 258,68 280,73 305,85 330,105 360,132 390,165 420,195 450,225"
    fill="none" stroke="#90caf9" stroke-width="1" stroke-dasharray="3,2"/>
  <polyline
    points="80,210 100,165 125,115 155,75 180,58 205,50 230,47 258,48 280,53 305,65 330,85 360,112 390,145 420,175 450,205"
    fill="none" stroke="#90caf9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- optimal alpha vertical line -->
  <line x1="230" y1="40" x2="230" y2="255" stroke="#e53935" stroke-width="2.2" stroke-dasharray="7,4"/>

  <!-- dots on curve -->
  <circle cx="80"  cy="220" r="3.5" fill="#2979ff"/>
  <circle cx="100" cy="175" r="3.5" fill="#2979ff"/>
  <circle cx="125" cy="125" r="3.5" fill="#2979ff"/>
  <circle cx="155" cy="85"  r="3.5" fill="#2979ff"/>
  <circle cx="180" cy="68"  r="3.5" fill="#2979ff"/>
  <circle cx="205" cy="60"  r="3.5" fill="#2979ff"/>
  <circle cx="230" cy="57"  r="5"   fill="#e53935" stroke="#fff" stroke-width="1.5"/>
  <circle cx="258" cy="58"  r="3.5" fill="#2979ff"/>
  <circle cx="280" cy="63"  r="3.5" fill="#2979ff"/>
  <circle cx="305" cy="75"  r="3.5" fill="#2979ff"/>
  <circle cx="330" cy="95"  r="3.5" fill="#2979ff"/>
  <circle cx="360" cy="122" r="3.5" fill="#2979ff"/>
  <circle cx="390" cy="155" r="3.5" fill="#2979ff"/>
  <circle cx="420" cy="185" r="3.5" fill="#2979ff"/>
  <circle cx="450" cy="215" r="3.5" fill="#2979ff"/>

  <!-- leaf count annotations (top) -->
  <text x="82"  cy="220" x="80"  y="212" text-anchor="middle" font-size="8" fill="#aaa">32</text>
  <text x="155" cy="85"  x="155" y="78"  text-anchor="middle" font-size="8" fill="#aaa">12</text>
  <text x="230" cy="57"  x="230" y="50"  text-anchor="middle" font-size="9" fill="#e53935" font-weight="600">7 leaves</text>
  <text x="390" cy="155" x="390" y="148" text-anchor="middle" font-size="8" fill="#aaa">3</text>
  <text x="450" cy="215" x="450" y="208" text-anchor="middle" font-size="8" fill="#aaa">1</text>

  <!-- region annotations -->
  <rect x="73" y="225" width="60" height="14" rx="4" fill="#e8f5e9"/>
  <text x="103" y="236" text-anchor="middle" font-size="9" fill="#2e7d32">overfits</text>
  <rect x="395" y="225" width="62" height="14" rx="4" fill="#fce4ec"/>
  <text x="426" y="236" text-anchor="middle" font-size="9" fill="#c62828">underfits</text>

  <!-- α* label -->
  <rect x="195" y="42" width="72" height="15" rx="5" fill="#ffebee"/>
  <text x="231" y="53" text-anchor="middle" font-size="10" font-weight="600" fill="#e53935">α* (CV-opt)</text>

  <!-- axis labels -->
  <text x="265" y="280" text-anchor="middle" font-size="12" fill="#333">α (complexity penalty)</text>
  <text x="22"  y="148" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90,22,148)">5-fold CV MSE</text>

  <!-- x ticks -->
  <text x="70"  y="268" text-anchor="middle" font-size="9" fill="#888">0</text>
  <text x="230" y="268" text-anchor="middle" font-size="9" fill="#e53935">α*</text>
  <text x="450" y="268" text-anchor="middle" font-size="9" fill="#888">large</text>

  <!-- y ticks -->
  <text x="65" y="258" text-anchor="end" font-size="9" fill="#888">low</text>
  <text x="65" y="43"  text-anchor="end" font-size="9" fill="#888">high</text>

  <!-- title -->
  <text x="265" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#222">
    Cost-complexity pruning path
  </text>

  <!-- legend -->
  <line x1="80" y1="295" x2="110" y2="295" stroke="#2979ff" stroke-width="2.5"/>
  <circle cx="95" cy="295" r="3.5" fill="#2979ff"/>
  <text x="114" y="299" font-size="10" fill="#555">CV MSE ± 1 SE</text>
  <line x1="230" y1="295" x2="260" y2="295" stroke="#e53935" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="264" y="299" font-size="10" fill="#555">optimal α</text>
</svg>
